<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExpenseFlow — Approvals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --canvas:#F6F7F9;
    --surface:#FFFFFF;
    --rail:#15191F;
    --rail-soft:#1E242C;
    --rail-text:#9AA3AE;
    --ink:#181C22;
    --muted:#6B7280;
    --faint:#9CA3AF;
    --border:#E7E9ED;
    --border-strong:#D7DBE0;
    --brand:#0E7C73;
    --brand-soft:#E4F2F0;
    --approve:#157347;
    --approve-soft:#E6F3EC;
    --escalate:#B45309;
    --escalate-soft:#FBF0E2;
    --blue:#2563EB; --blue-soft:#E8EFFD;
    --purple:#7C3AED; --purple-soft:#F0E9FD;
    --rose:#BE3455; --rose-soft:#FBE9EE;
    --shadow:0 1px 2px rgba(16,22,30,.04),0 8px 24px rgba(16,22,30,.06);
    --shadow-lg:0 12px 40px rgba(16,22,30,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--canvas);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    display:flex;
    overflow:hidden;
  }
  .tnum{font-variant-numeric:tabular-nums}

  /* ---------- Left rail ---------- */
  .rail{
    width:212px;flex-shrink:0;background:var(--rail);
    display:flex;flex-direction:column;padding:18px 14px;gap:6px;
  }
  .brand{display:flex;align-items:center;gap:9px;padding:6px 8px 14px;}
  .brand .mark{
    width:26px;height:26px;border-radius:7px;
    background:linear-gradient(140deg,var(--brand),#13A697);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    box-shadow:0 2px 8px rgba(14,124,115,.45);
  }
  .brand .mark svg{width:15px;height:15px}
  .brand .name{color:#fff;font-weight:600;font-size:14.5px;letter-spacing:-.2px}
  .brand .name span{color:var(--brand);font-weight:700}
  .navlabel{color:#5B6470;font-size:10.5px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;padding:14px 8px 6px}
  .navitem{
    display:flex;align-items:center;gap:10px;padding:8px 9px;border-radius:8px;
    color:var(--rail-text);font-size:13px;font-weight:500;cursor:pointer;user-select:none;
  }
  .navitem svg{width:16px;height:16px;opacity:.85}
  .navitem:hover{background:var(--rail-soft);color:#D7DCE2}
  .navitem.active{background:var(--rail-soft);color:#fff}
  .navitem.active svg{opacity:1;color:var(--brand)}
  .navitem .pill{margin-left:auto;background:var(--brand);color:#fff;font-size:11px;font-weight:600;
    border-radius:20px;padding:1px 7px;min-width:20px;text-align:center}
  .rail-foot{margin-top:auto;display:flex;align-items:center;gap:9px;padding:8px;border-top:1px solid #262C34}
  .rail-foot .av{width:28px;height:28px;border-radius:50%;background:#34607C;color:#cfe3f0;
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
  .rail-foot .who{line-height:1.2}
  .rail-foot .who b{color:#E4E8ED;font-size:12.5px;font-weight:600;display:block}
  .rail-foot .who small{color:#5B6470;font-size:11px}

  /* ---------- Main ---------- */
  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .topbar{
    height:58px;background:var(--surface);border-bottom:1px solid var(--border);
    display:flex;align-items:center;padding:0 22px;gap:14px;flex-shrink:0;
  }
  .topbar h1{font-size:16px;font-weight:600;letter-spacing:-.3px}
  .topbar .crumb{color:var(--faint);font-size:13px;font-weight:500}
  .topbar .spacer{flex:1}
  .search{
    display:flex;align-items:center;gap:8px;background:var(--canvas);border:1px solid var(--border);
    border-radius:9px;padding:7px 11px;width:220px;color:var(--faint);font-size:13px;
  }
  .search svg{width:14px;height:14px}
  .btn-ghost{display:flex;align-items:center;gap:7px;border:1px solid var(--border-strong);
    background:var(--surface);border-radius:9px;padding:7px 12px;font-size:13px;font-weight:500;
    color:var(--ink);cursor:pointer;font-family:inherit}
  .btn-ghost svg{width:14px;height:14px}
  .btn-ghost:hover{background:var(--canvas)}

  .work{flex:1;display:flex;min-height:0}

  /* ---------- Queue ---------- */
  .queue{width:392px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--surface)}
  .queue-head{padding:18px 20px 12px;display:flex;align-items:baseline;justify-content:space-between}
  .queue-head h2{font-size:14px;font-weight:600}
  .queue-head .meta{font-size:12px;color:var(--muted)}
  .queue-head .meta b{color:var(--brand);font-weight:600}
  .filters{display:flex;gap:7px;padding:0 20px 12px;border-bottom:1px solid var(--border)}
  .chip{font-size:12px;font-weight:500;color:var(--muted);background:var(--canvas);
    border:1px solid var(--border);border-radius:20px;padding:4px 11px;cursor:pointer}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .list{flex:1;overflow-y:auto;padding:8px}
  .row{
    display:flex;align-items:center;gap:12px;padding:12px 12px;border-radius:11px;cursor:pointer;
    border:1px solid transparent;transition:background .12s,border-color .12s,opacity .35s,transform .35s;
  }
  .row:hover{background:var(--canvas)}
  .row.sel{background:var(--brand-soft);border-color:#C9E6E2}
  .row.done{opacity:.5;pointer-events:none}
  .row.removing{opacity:0;transform:translateX(10px)}
  .av{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;
    justify-content:center;font-size:12.5px;font-weight:600;color:#fff;letter-spacing:.3px}
  .row .mid{flex:1;min-width:0}
  .row .nm{font-size:13.5px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:7px}
  .row .sub{font-size:12px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:6px}
  .row .amt{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;color:var(--ink)}
  .row .amt small{color:var(--faint);font-weight:500;font-size:11px}
  .pill{font-size:11px;font-weight:600;border-radius:6px;padding:2px 7px;letter-spacing:.1px;white-space:nowrap}
  .pill.travel{background:var(--blue-soft);color:var(--blue)}
  .pill.equipment{background:var(--purple-soft);color:var(--purple)}
  .pill.meals{background:var(--rose-soft);color:var(--rose)}
  .stat{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
  .stat.ok{background:var(--approve-soft);color:var(--approve)}
  .stat.esc{background:var(--escalate-soft);color:var(--escalate)}

  /* ---------- Detail ---------- */
  .detail{flex:1;overflow-y:auto;background:var(--canvas);min-width:0}
  .detail-inner{max-width:560px;margin:0 auto;padding:30px 34px 60px}
  .empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:var(--faint);gap:14px;text-align:center;padding:40px}
  .empty svg{width:38px;height:38px;opacity:.5}
  .empty p{font-size:13.5px;max-width:240px;line-height:1.5}

  .d-head{display:flex;align-items:flex-start;gap:14px;margin-bottom:24px}
  .d-head .av{width:46px;height:46px;font-size:15px}
  .d-head .who b{font-size:16px;font-weight:600;display:block;letter-spacing:-.2px}
  .d-head .who span{font-size:12.5px;color:var(--muted)}
  .d-head .ref{margin-left:auto;text-align:right}
  .d-head .ref small{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
  .d-head .ref div{font-size:13px;color:var(--muted);font-weight:500;margin-top:2px}

  .amount-card{
    background:var(--surface);border:1px solid var(--border);border-radius:16px;
    padding:24px;box-shadow:var(--shadow);margin-bottom:18px;
  }
  .amount-card .lbl{font-size:11.5px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.6px}
  .amount-card .big{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:46px;
    letter-spacing:-1.5px;line-height:1;margin:8px 0 18px}
  .amount-card .big small{font-size:24px;color:var(--faint);font-weight:600;margin-right:2px;vertical-align:6px}
  .meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);
    border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .meta-grid .cell{background:var(--surface);padding:13px 15px}
  .meta-grid .cell .k{font-size:11px;color:var(--faint);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
  .meta-grid .cell .v{font-size:13.5px;font-weight:600;color:var(--ink)}

  .block{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:18px;box-shadow:var(--shadow)}
  .block .k{font-size:11.5px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.5px;margin-bottom:9px}
  .block .memo{font-size:14px;color:var(--ink);line-height:1.5}
  .receipt{display:flex;align-items:center;gap:13px;margin-top:14px;padding:12px;border:1px solid var(--border);border-radius:11px;background:var(--canvas)}
  .receipt .thumb{width:42px;height:52px;border-radius:6px;background:repeating-linear-gradient(0deg,#fff,#fff 4px,#EEF0F3 4px,#EEF0F3 5px);
    border:1px solid var(--border-strong);flex-shrink:0;position:relative}
  .receipt .thumb::after{content:"";position:absolute;top:6px;left:6px;right:6px;height:7px;background:#DDE1E6;border-radius:2px;
    box-shadow:0 11px 0 -2px #E6E9ED,0 20px 0 -2px #E6E9ED}
  .receipt .rinfo b{font-size:13px;font-weight:600;display:block}
  .receipt .rinfo span{font-size:12px;color:var(--muted)}
  .receipt .view{margin-left:auto;color:var(--brand);font-size:12.5px;font-weight:600;cursor:pointer}

  .actions{display:flex;gap:12px;margin-top:24px}
  .btn{flex:1;display:flex;align-items:center;justify-content:center;gap:9px;padding:14px;
    border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid transparent;
    font-family:inherit;transition:transform .08s,filter .15s}
  .btn svg{width:17px;height:17px}
  .btn:active{transform:scale(.985)}
  .btn.approve{background:var(--approve);color:#fff}
  .btn.approve:hover{filter:brightness(1.06)}
  .btn.escalate{background:var(--surface);color:var(--escalate);border-color:#EBC9A0}
  .btn.escalate:hover{background:var(--escalate-soft)}

  .resolved{display:flex;align-items:center;gap:10px;margin-top:24px;padding:15px 18px;border-radius:12px;font-size:14px;font-weight:600}
  .resolved.ok{background:var(--approve-soft);color:var(--approve)}
  .resolved.esc{background:var(--escalate-soft);color:var(--escalate)}
  .resolved svg{width:18px;height:18px}

  /* ---------- Toast ---------- */
  .toast-wrap{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:50;display:flex;flex-direction:column;gap:10px;align-items:center}
  .toast{display:flex;align-items:center;gap:11px;background:var(--rail);color:#fff;padding:12px 18px;
    border-radius:12px;font-size:13.5px;font-weight:500;box-shadow:var(--shadow-lg);
    transform:translateY(20px);opacity:0;animation:toastIn .28s cubic-bezier(.2,.8,.3,1) forwards}
  .toast .dot{width:8px;height:8px;border-radius:50%}
  .toast .dot.ok{background:#34D399} .toast .dot.esc{background:#FBBF24}
  @keyframes toastIn{to{transform:translateY(0);opacity:1}}
  .toast.out{animation:toastOut .25s forwards}
  @keyframes toastOut{to{transform:translateY(20px);opacity:0}}

  @media (max-width:1080px){.queue{width:330px}.rail{width:64px}.brand .name,.navlabel,.navitem span,.navitem .pill,.rail-foot .who,.search{display:none}.navitem{justify-content:center}.rail-foot{justify-content:center}}
  @media (max-width:820px){.queue{width:300px}.detail{display:none}.queue{border-right:none}}
</style>
</head>
<body>

  <!-- LEFT RAIL -->
  <aside class="rail">
    <div class="brand">
      <div class="mark"><svg viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h16M4 17h10" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg></div>
      <div class="name">Expense<span>Flow</span></div>
    </div>
    <div class="navlabel">Workspace</div>
    <div class="navitem"><svg viewBox="0 0 24 24" fill="none"><path d="M3 12l9-9 9 9M5 10v10h14V10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg><span>Dashboard</span></div>
    <div class="navitem active"><svg viewBox="0 0 24 24" fill="none"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg><span>Approvals</span><span class="pill" id="navCount">4</span></div>
    <div class="navitem"><svg viewBox="0 0 24 24" fill="none"><path d="M3 3h18v4H3zM3 10h18v11H3z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg><span>Reports</span></div>
    <div class="navitem"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/><path d="M19 12a7 7 0 00-.1-1l2-1.5-2-3.4-2.3 1a7 7 0 00-1.7-1l-.3-2.6h-4l-.3 2.6a7 7 0 00-1.7 1l-2.3-1-2 3.4L4 11a7 7 0 000 2l-2 1.5 2 3.4 2.3-1a7 7 0 001.7 1l.3 2.6h4l.3-2.6a7 7 0 001.7-1l2.3 1 2-3.4L19 13a7 7 0 000-1z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg><span>Policies</span></div>
    <div class="rail-foot">
      <div class="av">JR</div>
      <div class="who"><b>Jordan Reyes</b><small>Finance Ops</small></div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <h1>Approvals</h1>
      <span class="crumb">/ Pending review</span>
      <div class="spacer"></div>
      <div class="search"><svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>Search expenses</div>
      <button class="btn-ghost"><svg viewBox="0 0 24 24" fill="none"><path d="M3 6h18M6 12h12M10 18h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>Filter</button>
    </div>

    <div class="work">
      <!-- QUEUE -->
      <section class="queue">
        <div class="queue-head">
          <h2>Pending queue</h2>
          <div class="meta"><b id="qCount">4</b> awaiting your review</div>
        </div>
        <div class="filters">
          <div class="chip on">All</div>
          <div class="chip">Travel</div>
          <div class="chip">Equipment</div>
          <div class="chip">Meals</div>
        </div>
        <div class="list" id="list"></div>
      </section>

      <!-- DETAIL -->
      <section class="detail" id="detail">
        <div class="empty" id="empty">
          <svg viewBox="0 0 24 24" fill="none"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <p>Select an expense from the queue to review and approve it.</p>
        </div>
      </section>
    </div>
  </div>

  <div class="toast-wrap" id="toasts"></div>

<script>
const AVS=['#0E7C73','#2563EB','#7C3AED','#BE3455','#D97706','#0891B2'];
const expenses=[
  {id:'EXP-4821',name:'Sarah Chen',  cat:'Travel',    amt:230, date:'Jun 24, 2026', memo:'Taxi + parking for on-site client visit (downtown).', receipt:'taxi_receipt.pdf'},
  {id:'EXP-4822',name:'Marcus Lee',  cat:'Travel',    amt:410, date:'Jun 24, 2026', memo:'Hotel, 1 night — vendor meeting, out of state.', receipt:'hotel_invoice.pdf'},
  {id:'EXP-4823',name:'Priya Nair',  cat:'Equipment', amt:310, date:'Jun 25, 2026', memo:'External monitor + mechanical keyboard for home setup.', receipt:'order_confirm.pdf'},
  {id:'EXP-4824',name:'David Kim',   cat:'Meals',     amt:560, date:'Jun 25, 2026', memo:'Client dinner, table of 6 — Q3 renewal discussion.', receipt:'restaurant_bill.pdf'},
  {id:'EXP-4825',name:'Ana Duarte',  cat:'Travel',    amt:95,  date:'Jun 26, 2026', memo:'Rideshare to airport.', receipt:'ride_receipt.pdf'},
  {id:'EXP-4826',name:'Tomáš Vrba',  cat:'Meals',     amt:48,  date:'Jun 26, 2026', memo:'Team lunch, working session.', receipt:'cafe_receipt.pdf'},
];
const state={}; // id -> 'approved' | 'escalated'
let selected=null;

const initials=n=>n.split(' ').map(w=>w[0]).slice(0,2).join('');
const avColor=n=>AVS[n.charCodeAt(0)%AVS.length];
const money=n=>n.toLocaleString('en-US');

const listEl=document.getElementById('list');
const detailEl=document.getElementById('detail');

function renderList(){
  listEl.innerHTML='';
  expenses.forEach(e=>{
    const row=document.createElement('div');
    row.className='row'+(selected===e.id?' sel':'')+(state[e.id]?' done':'');
    row.dataset.id=e.id;
    const st=state[e.id];
    const stHtml = st ? `<span class="stat ${st==='approved'?'ok':'esc'}">${st==='approved'?'Approved':'Escalated'}</span>` : '';
    row.innerHTML=`
      <div class="av" style="background:${avColor(e.name)}">${initials(e.name)}</div>
      <div class="mid">
        <div class="nm">${e.name}</div>
        <div class="sub"><span class="pill ${e.cat.toLowerCase()}">${e.cat}</span><span>·</span><span>${e.date}</span></div>
      </div>
      <div style="text-align:right">
        <div class="amt"><small>$</small>${money(e.amt)}</div>
        <div style="margin-top:5px">${stHtml}</div>
      </div>`;
    row.onclick=()=>{selected=e.id;renderList();renderDetail();};
    listEl.appendChild(row);
  });
}

function renderDetail(){
  const e=expenses.find(x=>x.id===selected);
  if(!e){detailEl.innerHTML='';detailEl.appendChild(document.getElementById('empty'));return;}
  const st=state[e.id];
  const resolved = st ? `
    <div class="resolved ${st==='approved'?'ok':'esc'}">
      ${st==='approved'
        ? '<svg viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg> Approved — payment scheduled'
        : '<svg viewBox="0 0 24 24" fill="none"><path d="M12 9v4M12 17h.01M10.3 3.9L1.8 18a2 2 0 001.7 3h17a2 2 0 001.7-3L14.4 3.9a2 2 0 00-3.4 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Sent to human review'}
    </div>` : `
    <div class="actions">
      <button class="btn approve" onclick="act('${e.id}','approved')">
        <svg viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg> Approve
      </button>
      <button class="btn escalate" onclick="act('${e.id}','escalated')">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 9v4M12 17h.01M10.3 3.9L1.8 18a2 2 0 001.7 3h17a2 2 0 001.7-3L14.4 3.9a2 2 0 00-3.4 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Send for review
      </button>
    </div>`;
  detailEl.innerHTML=`
    <div class="detail-inner">
      <div class="d-head">
        <div class="av" style="background:${avColor(e.name)}">${initials(e.name)}</div>
        <div class="who"><b>${e.name}</b><span>Submitted ${e.date}</span></div>
        <div class="ref"><small>Reference</small><div>${e.id}</div></div>
      </div>

      <div class="amount-card">
        <div class="lbl">Reimbursement requested</div>
        <div class="big tnum"><small>$</small>${money(e.amt)}</div>
        <div class="meta-grid">
          <div class="cell"><div class="k">Category</div><div class="v"><span class="pill ${e.cat.toLowerCase()}">${e.cat}</span></div></div>
          <div class="cell"><div class="k">Submitted</div><div class="v">${e.date}</div></div>
        </div>
      </div>

      <div class="block">
        <div class="k">Description</div>
        <div class="memo">${e.memo}</div>
        <div class="receipt">
          <div class="thumb"></div>
          <div class="rinfo"><b>${e.receipt}</b><span>Attached receipt · 1 file</span></div>
          <div class="view">View</div>
        </div>
      </div>

      ${resolved}
    </div>`;
}

function act(id,decision){
  state[id]=decision;
  const e=expenses.find(x=>x.id===id);
  toast(decision==='approved'
    ? {dot:'ok',  text:`Approved — ${e.name}, $${money(e.amt)}`}
    : {dot:'esc', text:`Sent to review — ${e.name}, $${money(e.amt)}`});
  renderDetail();
  // animate the row out of the queue
  const row=[...listEl.children].find(r=>r.dataset.id===id);
  if(row){row.classList.add('removing');}
  setTimeout(()=>{renderList();updateCounts();},420);
}

function updateCounts(){
  const pending=expenses.filter(e=>!state[e.id]).length;
  document.getElementById('qCount').textContent=pending;
  document.getElementById('navCount').textContent=pending;
}

function toast({dot,text}){
  const wrap=document.getElementById('toasts');
  const t=document.createElement('div');
  t.className='toast';
  t.innerHTML=`<span class="dot ${dot}"></span>${text}`;
  wrap.appendChild(t);
  setTimeout(()=>{t.classList.add('out');setTimeout(()=>t.remove(),260);},2600);
}

renderList();
</script>
</body>
</html>
