<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trailwise Demo Onboarding</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel" data-step="welcome">
        <p class="eyebrow">Trailwise Demo</p>
        <h1>Onboarding workflow</h1>
        <p>Use this local page to record a deterministic Chrome workflow.</p>
        <button type="button" data-testid="create-account" id="createAccount">Create account</button>
      </section>

      <form class="panel hidden" data-step="account" id="accountForm">
        <p class="eyebrow">Step 1</p>
        <h1>Create account</h1>
        <label>
          Name
          <input name="name" autocomplete="name" placeholder="Riley Chen" />
        </label>
        <label>
          Email
          <input name="email" type="email" autocomplete="email" placeholder="riley@example.com" />
        </label>
        <label>
          Password
          <input name="password" type="password" autocomplete="new-password" placeholder="Use a test password" />
        </label>
        <label>
          Company size
          <select name="company_size" aria-label="Company size">
            <option>1-10</option>
            <option>11-50</option>
            <option>51-200</option>
          </select>
        </label>
        <button type="submit" data-testid="continue">Continue</button>
      </form>

      <section class="panel hidden" data-step="plan">
        <p class="eyebrow">Step 2</p>
        <h1>Choose plan</h1>
        <button type="button" data-testid="plan-starter" class="secondary">Starter</button>
        <button type="button" data-testid="plan-team">Team</button>
      </section>

      <section class="panel hidden" data-step="dashboard">
        <p class="eyebrow">Dashboard</p>
        <h1>Setup complete</h1>
        <p>Your demo account is ready.</p>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
